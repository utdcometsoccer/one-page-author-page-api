name: Build and deploy Azure Functions and Infrastructure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  # Function App paths
  FUNCTION_APP_PATH: 'function-app'
  IMAGE_API_PATH: 'ImageAPI'
  INK_STAINED_WRETCH_FUNCTIONS_PATH: 'InkStainedWretchFunctions'
  INK_STAINED_WRETCH_STRIPE_PATH: 'InkStainedWretchStripe'
  INK_STAINED_WRETCHES_CONFIG_PATH: 'InkStainedWretchesConfig'
  # WHMCS Worker Service path
  WHMCS_WORKER_SERVICE_PATH: 'WhmcsWorkerService'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # =========================================
      # Generate Version Number
      # =========================================

      - name: 'Generate Version Number'
        id: version
        shell: bash
        run: |
          # Version format: MAJOR.MINOR.BUILD
          # MAJOR: Increments yearly (starts at 0)
          # MINOR: Increments monthly (1-12), resets to 1 yearly
          # BUILD: GitHub run number
          
          # Calculate major version based on years since project start (2025)
          BASE_YEAR=2025
          CURRENT_YEAR=$(date +%Y)
          MAJOR_VERSION=$((CURRENT_YEAR - BASE_YEAR))
          
          # Calculate minor version based on current month (1-12)
          CURRENT_MONTH=$(date +%-m)
          MINOR_VERSION=$CURRENT_MONTH
          
          BUILD_NUMBER=${{ github.run_number }}
          
          VERSION="${MAJOR_VERSION}.${MINOR_VERSION}.${BUILD_NUMBER}"
          
          # Get short commit SHA for informational version
          SHORT_SHA=$(git rev-parse --short HEAD)
          
          # Informational version includes build metadata
          INFORMATIONAL_VERSION="${VERSION}+sha.${SHORT_SHA}"
          
          echo "Version: ${VERSION}"
          echo "Informational Version: ${INFORMATIONAL_VERSION}"
          echo "Build Number: ${BUILD_NUMBER}"
          echo "Major Version: ${MAJOR_VERSION} (Year: ${CURRENT_YEAR})"
          echo "Minor Version: ${MINOR_VERSION} (Month: ${CURRENT_MONTH})"
          
          # Export for subsequent steps
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "INFORMATIONAL_VERSION=${INFORMATIONAL_VERSION}" >> $GITHUB_ENV
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> $GITHUB_ENV

      # =========================================
      # Run Unit Tests
      # =========================================

      - name: 'Run Unit Tests'
        shell: bash
        run: |
          echo "Running unit tests..."
          dotnet test OnePageAuthorAPI.sln --configuration Release --verbosity normal --logger "console;verbosity=detailed"

      # =========================================
      # Build all Function Apps
      # =========================================

      - name: 'Build and Publish function-app'
        shell: bash
        run: |
          echo "Building function-app..."
          echo "Version: ${{ env.VERSION }}"
          echo "Informational Version: ${{ env.INFORMATIONAL_VERSION }}"
          pushd '${{ env.FUNCTION_APP_PATH }}'
          dotnet build --configuration Release /p:Version=${{ env.VERSION }} /p:InformationalVersion=${{ env.INFORMATIONAL_VERSION }}
          dotnet publish --configuration Release --output ./output /p:Version=${{ env.VERSION }} /p:InformationalVersion=${{ env.INFORMATIONAL_VERSION }}
          popd

      - name: 'Zip function-app Output'
        shell: bash
        run: |
          cd '${{ env.FUNCTION_APP_PATH }}/output'
          zip -r ../functionapp.zip .
          cd ../..

      - name: 'Build and Publish ImageAPI'
        shell: bash
        run: |
          echo "Building ImageAPI..."
          echo "Version: ${{ env.VERSION }}"
          echo "Informational Version: ${{ env.INFORMATIONAL_VERSION }}"
          pushd '${{ env.IMAGE_API_PATH }}'
          dotnet build --configuration Release /p:Version=${{ env.VERSION }} /p:InformationalVersion=${{ env.INFORMATIONAL_VERSION }}
          dotnet publish --configuration Release --output ./output /p:Version=${{ env.VERSION }} /p:InformationalVersion=${{ env.INFORMATIONAL_VERSION }}
          popd

      - name: 'Zip ImageAPI Output'
        shell: bash
        run: |
          cd '${{ env.IMAGE_API_PATH }}/output'
          zip -r ../imageapi.zip .
          cd ../..

      - name: 'Build and Publish InkStainedWretchFunctions'
        shell: bash
        run: |
          echo "Building InkStainedWretchFunctions..."
          echo "Version: ${{ env.VERSION }}"
          echo "Informational Version: ${{ env.INFORMATIONAL_VERSION }}"
          pushd '${{ env.INK_STAINED_WRETCH_FUNCTIONS_PATH }}'
          dotnet build --configuration Release /p:Version=${{ env.VERSION }} /p:InformationalVersion=${{ env.INFORMATIONAL_VERSION }}
          dotnet publish --configuration Release --output ./output /p:Version=${{ env.VERSION }} /p:InformationalVersion=${{ env.INFORMATIONAL_VERSION }}
          popd

      - name: 'Zip InkStainedWretchFunctions Output'
        shell: bash
        run: |
          cd '${{ env.INK_STAINED_WRETCH_FUNCTIONS_PATH }}/output'
          zip -r ../inkstainedwretchfunctions.zip .
          cd ../..

      - name: 'Build and Publish InkStainedWretchStripe'
        shell: bash
        run: |
          echo "Building InkStainedWretchStripe..."
          echo "Version: ${{ env.VERSION }}"
          echo "Informational Version: ${{ env.INFORMATIONAL_VERSION }}"
          pushd '${{ env.INK_STAINED_WRETCH_STRIPE_PATH }}'
          dotnet build --configuration Release /p:Version=${{ env.VERSION }} /p:InformationalVersion=${{ env.INFORMATIONAL_VERSION }}
          dotnet publish --configuration Release --output ./output /p:Version=${{ env.VERSION }} /p:InformationalVersion=${{ env.INFORMATIONAL_VERSION }}
          popd

      - name: 'Zip InkStainedWretchStripe Output'
        shell: bash
        run: |
          cd '${{ env.INK_STAINED_WRETCH_STRIPE_PATH }}/output'
          zip -r ../inkstainedwretchstripe.zip .
          cd ../..

      - name: 'Build and Publish InkStainedWretchesConfig'
        shell: bash
        run: |
          echo "Building InkStainedWretchesConfig..."
          echo "Version: ${{ env.VERSION }}"
          echo "Informational Version: ${{ env.INFORMATIONAL_VERSION }}"
          pushd '${{ env.INK_STAINED_WRETCHES_CONFIG_PATH }}'
          dotnet build --configuration Release /p:Version=${{ env.VERSION }} /p:InformationalVersion=${{ env.INFORMATIONAL_VERSION }}
          dotnet publish --configuration Release --output ./output /p:Version=${{ env.VERSION }} /p:InformationalVersion=${{ env.INFORMATIONAL_VERSION }}
          popd

      - name: 'Zip InkStainedWretchesConfig Output'
        shell: bash
        run: |
          cd '${{ env.INK_STAINED_WRETCHES_CONFIG_PATH }}/output'
          zip -r ../inkstainedwretchesconfig.zip .
          cd ../..

      - name: 'Build and Publish WhmcsWorkerService'
        shell: bash
        run: |
          echo "Building WhmcsWorkerService..."
          echo "Version: ${{ env.VERSION }}"
          echo "Informational Version: ${{ env.INFORMATIONAL_VERSION }}"
          pushd '${{ env.WHMCS_WORKER_SERVICE_PATH }}'
          # -r linux-x64 with --self-contained false produces a framework-dependent
          # publish trimmed for the Linux x64 target (excludes Windows/macOS binaries).
          dotnet publish --configuration Release \
            -r linux-x64 \
            --self-contained false \
            --output ./output \
            /p:Version=${{ env.VERSION }} \
            /p:InformationalVersion=${{ env.INFORMATIONAL_VERSION }}
          popd

      - name: 'Zip WhmcsWorkerService Output'
        shell: bash
        run: |
          # Include the systemd service unit file in the deployment package
          cp '${{ env.WHMCS_WORKER_SERVICE_PATH }}/whmcs-worker.service' \
             '${{ env.WHMCS_WORKER_SERVICE_PATH }}/output/'
          cd '${{ env.WHMCS_WORKER_SERVICE_PATH }}/output'
          zip -r ../whmcsworker.zip .
          cd ../..

      # =========================================
      # Azure Authentication
      # =========================================

      - name: 'Login to Azure'
        continue-on-error: true
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # =========================================
      # Deploy Cosmos DB Account (Conditional)
      # =========================================

      - name: 'Deploy Cosmos DB Account'
        continue-on-error: true
        shell: bash
        env:
          COSMOSDB_RESOURCE_GROUP: ${{ secrets.COSMOSDB_RESOURCE_GROUP }}
          COSMOSDB_ACCOUNT_NAME: ${{ secrets.COSMOSDB_ACCOUNT_NAME }}
          COSMOSDB_LOCATION: ${{ secrets.COSMOSDB_LOCATION }}
          COSMOSDB_ENABLE_FREE_TIER: ${{ secrets.COSMOSDB_ENABLE_FREE_TIER }}
          COSMOSDB_ENABLE_ZONE_REDUNDANCY: ${{ secrets.COSMOSDB_ENABLE_ZONE_REDUNDANCY }}
        run: |
          # Validate required secrets are available
          if [ -z "$COSMOSDB_RESOURCE_GROUP" ] || [ -z "$COSMOSDB_ACCOUNT_NAME" ] || [ -z "$COSMOSDB_LOCATION" ]; then
            echo "⚠️ Skipping Cosmos DB deployment: Required secrets not configured"
            echo "   Required: COSMOSDB_RESOURCE_GROUP, COSMOSDB_ACCOUNT_NAME, COSMOSDB_LOCATION"
            exit 0
          fi

          echo "✓ Checking if Cosmos DB Account exists..."

          # Check if resource group exists, create if it doesn't
          if ! az group show --name "$COSMOSDB_RESOURCE_GROUP" &> /dev/null; then
            echo "📦 Creating resource group: $COSMOSDB_RESOURCE_GROUP"
            az group create --name "$COSMOSDB_RESOURCE_GROUP" --location "$COSMOSDB_LOCATION"
          else
            echo "✓ Resource group exists: $COSMOSDB_RESOURCE_GROUP"
          fi

          # Check if Cosmos DB Account exists
          if ! az cosmosdb show --name "$COSMOSDB_ACCOUNT_NAME" --resource-group "$COSMOSDB_RESOURCE_GROUP" &> /dev/null; then
            echo "📦 Cosmos DB Account does not exist. Deploying..."

            # Build deployment parameters
            PARAMS="cosmosDbAccountName=$COSMOSDB_ACCOUNT_NAME location=$COSMOSDB_LOCATION"

            # Add optional free tier parameter if configured
            if [ "$COSMOSDB_ENABLE_FREE_TIER" = "true" ]; then
              PARAMS="$PARAMS enableFreeTier=true"
              echo "✓ Free tier will be enabled"
            else
              PARAMS="$PARAMS enableFreeTier=false"
            fi

            # Add optional zone redundancy parameter if configured
            if [ "$COSMOSDB_ENABLE_ZONE_REDUNDANCY" = "true" ]; then
              PARAMS="$PARAMS enableZoneRedundancy=true"
              echo "✓ Zone redundancy will be enabled"
            else
              PARAMS="$PARAMS enableZoneRedundancy=false"
              echo "⚠️ Zone redundancy disabled (recommended for development)"
            fi

            # Deploy Cosmos DB Account
            az deployment group create \
              --resource-group "$COSMOSDB_RESOURCE_GROUP" \
              --template-file infra/cosmosdb.bicep \
              --parameters $PARAMS \
              --output none

            echo "✓ Cosmos DB Account deployed successfully"

            # Note: Connection string and keys are available in deployment outputs
            # but not displayed here for security reasons. They can be retrieved from
            # Azure Portal or using Azure CLI: az cosmosdb keys list
          else
            echo "✓ Cosmos DB Account already exists. Skipping deployment."
          fi

      # =========================================
      # Deploy Application Insights (Conditional)
      # =========================================

      - name: 'Deploy Application Insights'
        continue-on-error: true
        shell: bash
        env:
          COSMOSDB_RESOURCE_GROUP: ${{ secrets.COSMOSDB_RESOURCE_GROUP }}
          APPINSIGHTS_NAME: ${{ secrets.APPINSIGHTS_NAME }}
          COSMOSDB_LOCATION: ${{ secrets.COSMOSDB_LOCATION }}
        run: |
          # Validate required secrets are available
          if [ -z "$COSMOSDB_RESOURCE_GROUP" ] || [ -z "$APPINSIGHTS_NAME" ] || [ -z "$COSMOSDB_LOCATION" ]; then
            echo "⚠️ Skipping Application Insights deployment: Required secrets not configured"
            echo "   Required: COSMOSDB_RESOURCE_GROUP, APPINSIGHTS_NAME, COSMOSDB_LOCATION"
            exit 0
          fi

          echo "✓ Checking if Application Insights exists..."

          # Check if resource group exists (should exist from Cosmos DB step)
          if ! az group show --name "$COSMOSDB_RESOURCE_GROUP" &> /dev/null; then
            echo "📦 Creating resource group: $COSMOSDB_RESOURCE_GROUP"
            az group create --name "$COSMOSDB_RESOURCE_GROUP" --location "$COSMOSDB_LOCATION"
          else
            echo "✓ Resource group exists: $COSMOSDB_RESOURCE_GROUP"
          fi

          # Check if Application Insights exists
          if ! az monitor app-insights component show --app "$APPINSIGHTS_NAME" --resource-group "$COSMOSDB_RESOURCE_GROUP" &> /dev/null; then
            echo "📦 Application Insights does not exist. Deploying..."

            # Deploy Application Insights
            az deployment group create \
              --resource-group "$COSMOSDB_RESOURCE_GROUP" \
              --template-file infra/applicationinsights.bicep \
              --parameters appInsightsName="$APPINSIGHTS_NAME" \
                          location="$COSMOSDB_LOCATION" \
              --output none

            echo "✓ Application Insights deployed successfully"

            # Note: Instrumentation key and connection string are available in deployment outputs
            # but not displayed here for security reasons. They can be retrieved from
            # Azure Portal or using Azure CLI: az monitor app-insights component show
          else
            echo "✓ Application Insights already exists. Skipping deployment."
          fi

      # =========================================
      # Deploy Existing function-app Infrastructure
      # =========================================

      - name: 'Deploy function-app Infrastructure'
        continue-on-error: true
        shell: bash
        env:
          FUNCTION_APP_NAME: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          RESOURCE_GROUP: ${{ secrets.FUNCTION_APP_RESOURCE_GROUP }}
          LOCATION: ${{ secrets.FUNCTION_APP_LOCATION }}
        run: |
          # Validate required secrets are available
          if [ -z "$FUNCTION_APP_NAME" ] || [ -z "$RESOURCE_GROUP" ] || [ -z "$LOCATION" ]; then
            echo "⚠️ Skipping function-app infrastructure deployment: Required secrets not configured"
            echo "   Required: AZURE_FUNCTIONAPP_NAME, FUNCTION_APP_RESOURCE_GROUP, FUNCTION_APP_LOCATION"
            exit 0
          fi

          echo "✓ Checking if function-app exists..."
          # Check if Function App exists
          if ! az functionapp show --name "$FUNCTION_APP_NAME" --resource-group "$RESOURCE_GROUP" &> /dev/null; then
            echo "📦 Function App does not exist. Deploying infrastructure..."
            az deployment group create \
              --resource-group "$RESOURCE_GROUP" \
              --template-file infra/functionapp.bicep \
              --parameters functionAppName="$FUNCTION_APP_NAME" \
                          location="$LOCATION"
            echo "✓ Infrastructure deployed successfully"
          else
            echo "✓ Function App already exists. Skipping infrastructure deployment."
          fi

      - name: 'Deploy to function-app'
        continue-on-error: true
        shell: bash
        env:
          FUNCTION_APP_NAME: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          RESOURCE_GROUP: ${{ secrets.FUNCTION_APP_RESOURCE_GROUP }}
        run: |
          # Validate required secrets are available
          if [ -z "$FUNCTION_APP_NAME" ] || [ -z "$RESOURCE_GROUP" ]; then
            echo "⚠️ Skipping function-app deployment: Required secrets not configured"
            echo "   Required: AZURE_FUNCTIONAPP_NAME, FUNCTION_APP_RESOURCE_GROUP"
            exit 0
          fi

          echo "🚀 Deploying function-app..."
          az functionapp deployment source config-zip \
            --name "$FUNCTION_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --src '${{ env.FUNCTION_APP_PATH }}/functionapp.zip'
          echo "✓ function-app deployed successfully"

      - name: 'Set function-app Application Insights connection string'
        continue-on-error: true
        shell: bash
        env:
          FUNCTION_APP_NAME: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          RESOURCE_GROUP: ${{ secrets.FUNCTION_APP_RESOURCE_GROUP }}
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
          APPLICATIONINSIGHTS_CONNECTION_STRING_FUNCTION_APP: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING_FUNCTION_APP }}
        run: |
          AI_CONN="${APPLICATIONINSIGHTS_CONNECTION_STRING_FUNCTION_APP:-$APPLICATIONINSIGHTS_CONNECTION_STRING}"

          # Validate required secrets are available
          if [ -z "$FUNCTION_APP_NAME" ] || [ -z "$RESOURCE_GROUP" ] || [ -z "$AI_CONN" ]; then
            echo "⚠️ Skipping app setting update for function-app (missing required values)"
            echo "   Required: AZURE_FUNCTIONAPP_NAME, FUNCTION_APP_RESOURCE_GROUP, APPLICATIONINSIGHTS_CONNECTION_STRING(_FUNCTION_APP)"
            exit 0
          fi

          # Verify the Function App exists before attempting to set app settings
          if ! az functionapp show --name "$FUNCTION_APP_NAME" --resource-group "$RESOURCE_GROUP" &> /dev/null; then
            echo "⚠️ Function App '$FUNCTION_APP_NAME' not found in resource group '$RESOURCE_GROUP'. Skipping app setting update."
            exit 0
          fi

          echo "🔧 Setting APPLICATIONINSIGHTS_CONNECTION_STRING on function-app..."
          az functionapp config appsettings set \
            --name "$FUNCTION_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --settings "APPLICATIONINSIGHTS_CONNECTION_STRING=$AI_CONN" \
            --only-show-errors \
            --output none
          echo "✓ App setting applied to function-app"

      - name: 'Set function-app Cosmos DB settings'
        continue-on-error: true
        shell: bash
        env:
          FUNCTION_APP_NAME: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          RESOURCE_GROUP: ${{ secrets.FUNCTION_APP_RESOURCE_GROUP }}
          COSMOSDB_ENDPOINT_URI: ${{ secrets.COSMOSDB_ENDPOINT_URI }}
          COSMOSDB_PRIMARY_KEY: ${{ secrets.COSMOSDB_PRIMARY_KEY }}
          COSMOSDB_DATABASE_ID: ${{ secrets.COSMOSDB_DATABASE_ID }}
        run: |
          # Validate required values are available
          if [ -z "$FUNCTION_APP_NAME" ] || [ -z "$RESOURCE_GROUP" ]; then
            echo "⚠️ Skipping Cosmos DB app setting update for function-app (missing AZURE_FUNCTIONAPP_NAME/FUNCTION_APP_RESOURCE_GROUP)"
            exit 0
          fi

          if [ -z "$COSMOSDB_ENDPOINT_URI" ] || [ -z "$COSMOSDB_PRIMARY_KEY" ] || [ -z "$COSMOSDB_DATABASE_ID" ]; then
            echo "⚠️ Skipping Cosmos DB app setting update for function-app (missing Cosmos DB settings)"
            echo "   Required: COSMOSDB_ENDPOINT_URI, COSMOSDB_PRIMARY_KEY, COSMOSDB_DATABASE_ID"
            exit 0
          fi

          # Verify the Function App exists before attempting to set app settings
          if ! az functionapp show --name "$FUNCTION_APP_NAME" --resource-group "$RESOURCE_GROUP" &> /dev/null; then
            echo "⚠️ Function App '$FUNCTION_APP_NAME' not found in resource group '$RESOURCE_GROUP'. Skipping Cosmos DB app setting update."
            exit 0
          fi

          echo "🔧 Setting Cosmos DB settings on function-app..."
          az functionapp config appsettings set \
            --name "$FUNCTION_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --settings \
              "COSMOSDB_ENDPOINT_URI=$COSMOSDB_ENDPOINT_URI" \
              "COSMOSDB_PRIMARY_KEY=$COSMOSDB_PRIMARY_KEY" \
              "COSMOSDB_DATABASE_ID=$COSMOSDB_DATABASE_ID" \
            --only-show-errors \
            --output none
          echo "✓ Cosmos DB app settings applied to function-app"

      # =========================================
      # Register Azure Communication Services Provider (if needed)
      # =========================================

      - name: 'Register Microsoft.Communication Resource Provider'
        # Note: continue-on-error allows optional Communication Services deployment
        # to not block other infrastructure deployments. If registration fails,
        # the subsequent deployment step will fail with a clear error message.
        continue-on-error: true
        shell: bash
        env:
          DEPLOY_COMMUNICATION_SERVICES: ${{ secrets.DEPLOY_COMMUNICATION_SERVICES }}
        run: |
          # Only register if Communication Services deployment is enabled
          if [ "$DEPLOY_COMMUNICATION_SERVICES" != "true" ]; then
            echo "⚠️ Skipping Microsoft.Communication provider registration (DEPLOY_COMMUNICATION_SERVICES not set to 'true')"
            exit 0
          fi

          echo "📦 Checking Microsoft.Communication resource provider registration..."

          # Check if provider is already registered (capture stderr separately)
          PROVIDER_STATE_OUTPUT=$(az provider show --namespace Microsoft.Communication --query "registrationState" --output tsv 2>&1)
          PROVIDER_CHECK_EXIT=$?

          if [ $PROVIDER_CHECK_EXIT -ne 0 ]; then
            echo "⚠️ Warning: Unable to check provider status. This may be due to:"
            echo "   - Authentication issues"
            echo "   - Insufficient permissions"
            echo "   - Azure CLI not properly configured"
            echo "   Error output: $PROVIDER_STATE_OUTPUT"
            echo "   Attempting to register provider anyway..."
            PROVIDER_STATE="Unknown"
          else
            PROVIDER_STATE="$PROVIDER_STATE_OUTPUT"
          fi

          if [ "$PROVIDER_STATE" = "Registered" ]; then
            echo "✓ Microsoft.Communication provider is already registered"
          else
            echo "📝 Registering Microsoft.Communication provider (current state: $PROVIDER_STATE)..."
            if ! REGISTER_OUTPUT=$(az provider register --namespace Microsoft.Communication --wait 2>&1); then
              echo "❌ ERROR: Failed to register Microsoft.Communication provider"
              echo "   Error output: $REGISTER_OUTPUT"
              echo "   This is required for Azure Communication Services deployment"
              echo "   Please ensure you have sufficient permissions (Contributor or Owner role)"
              echo "   Continuing anyway - deployment may fail with clear error message"
              exit 0
            fi

            # Verify registration (capture stderr separately)
            PROVIDER_STATE_OUTPUT=$(az provider show --namespace Microsoft.Communication --query "registrationState" --output tsv 2>&1)
            PROVIDER_CHECK_EXIT=$?

            if [ $PROVIDER_CHECK_EXIT -ne 0 ]; then
              echo "⚠️ Warning: Unable to verify provider registration status"
              echo "   Error output: $PROVIDER_STATE_OUTPUT"
              echo "   Deployment will proceed, but may fail if registration is incomplete"
            elif [ "$PROVIDER_STATE_OUTPUT" = "Registered" ]; then
              echo "✓ Microsoft.Communication provider registered successfully"
            else
              echo "⚠️ Provider registration state: $PROVIDER_STATE_OUTPUT (may still be registering)"
              echo "   Deployment will proceed, but may fail if registration is not complete"
            fi
          fi

      # =========================================
      # Deploy Ink Stained Wretches Infrastructure
      # =========================================

      # =========================================
      # Deploy Service Bus Infrastructure (Conditional)
      # =========================================

      - name: 'Deploy Service Bus Infrastructure'
        shell: bash
        env:
          WHMCS_WORKER_RESOURCE_GROUP: ${{ secrets.WHMCS_WORKER_RESOURCE_GROUP }}
          WHMCS_WORKER_LOCATION: ${{ secrets.WHMCS_WORKER_LOCATION }}
          WHMCS_SB_NAMESPACE_NAME: ${{ secrets.WHMCS_SB_NAMESPACE_NAME }}
          WHMCS_SB_QUEUE_NAME: ${{ secrets.WHMCS_SB_QUEUE_NAME }}
          DEPLOY_WHMCS_WORKER: ${{ secrets.DEPLOY_WHMCS_WORKER }}
        run: |
          if [ "$DEPLOY_WHMCS_WORKER" != "true" ] || [ -z "$WHMCS_WORKER_RESOURCE_GROUP" ]; then
            echo "⚠️ Skipping Service Bus deployment: DEPLOY_WHMCS_WORKER not set to 'true' or WHMCS_WORKER_RESOURCE_GROUP missing"
            echo "   Required: DEPLOY_WHMCS_WORKER=true, WHMCS_WORKER_RESOURCE_GROUP"
            exit 0
          fi

          SB_NAMESPACE="${WHMCS_SB_NAMESPACE_NAME:-onepageauthor-bus}"
          LOCATION="${WHMCS_WORKER_LOCATION:-eastus}"
          SB_QUEUE_NAME="${WHMCS_SB_QUEUE_NAME:-whmcs-domain-registrations}"

          echo "📦 Ensuring resource group exists: $WHMCS_WORKER_RESOURCE_GROUP"
          if ! az group show --name "$WHMCS_WORKER_RESOURCE_GROUP" &>/dev/null; then
            az group create --name "$WHMCS_WORKER_RESOURCE_GROUP" --location "$LOCATION"
            echo "✓ Resource group created: $WHMCS_WORKER_RESOURCE_GROUP"
          else
            echo "✓ Resource group exists: $WHMCS_WORKER_RESOURCE_GROUP"
          fi

          # Always deploy via Bicep (incremental mode) so the queue and auth rules
          # (WhmcsSender/WhmcsListener) are created/updated even when the namespace
          # already exists.
          echo "📦 Deploying/Updating Service Bus namespace and related resources via Bicep (idempotent)..."
          az deployment group create \
            --resource-group "$WHMCS_WORKER_RESOURCE_GROUP" \
            --template-file infra/servicebus.bicep \
            --parameters namespaceName="$SB_NAMESPACE" location="$LOCATION" whmcsQueueName="$SB_QUEUE_NAME" \
            --output json > sb-deployment-output.json
          echo "✓ Service Bus infrastructure deployment completed"

          # Capture outputs for later steps (avoid querying keys via az servicebus).
          SB_LISTENER_CONN=$(jq -r '.properties.outputs.listenerConnectionString.value // empty' sb-deployment-output.json)
          SB_SENDER_CONN=$(jq -r '.properties.outputs.senderConnectionString.value // empty' sb-deployment-output.json)
          SB_QUEUE_OUT=$(jq -r '.properties.outputs.whmcsQueueName.value // empty' sb-deployment-output.json)

          if [ -n "$SB_LISTENER_CONN" ]; then
            echo "::add-mask::$SB_LISTENER_CONN"
            echo "WHMCS_SB_LISTENER_CONNECTION_STRING=$SB_LISTENER_CONN" >> $GITHUB_ENV
          fi

          if [ -n "$SB_SENDER_CONN" ]; then
            echo "::add-mask::$SB_SENDER_CONN"
            echo "WHMCS_SB_SENDER_CONNECTION_STRING=$SB_SENDER_CONN" >> $GITHUB_ENV
          fi

          # Prefer the queue name emitted by the template (should match the parameter).
          if [ -n "$SB_QUEUE_OUT" ]; then
            echo "WHMCS_SB_QUEUE_NAME_DEPLOYED=$SB_QUEUE_OUT" >> $GITHUB_ENV
          else
            echo "WHMCS_SB_QUEUE_NAME_DEPLOYED=$SB_QUEUE_NAME" >> $GITHUB_ENV
          fi

      - name: 'Deploy Ink Stained Wretches Infrastructure'
        continue-on-error: true
        shell: bash
        env:
          # Required deployment configuration
          ISW_RESOURCE_GROUP: ${{ secrets.ISW_RESOURCE_GROUP }}
          ISW_LOCATION: ${{ secrets.ISW_LOCATION }}
          ISW_BASE_NAME: ${{ secrets.ISW_BASE_NAME }}
          ISW_DNS_ZONE_NAME: ${{ secrets.ISW_DNS_ZONE_NAME }}
          DEPLOY_COMMUNICATION_SERVICES: ${{ secrets.DEPLOY_COMMUNICATION_SERVICES }}
          
          # Core secrets (required for basic functionality)
          COSMOSDB_CONNECTION_STRING: ${{ secrets.COSMOSDB_CONNECTION_STRING }}
          COSMOSDB_ENDPOINT_URI: ${{ secrets.COSMOSDB_ENDPOINT_URI }}
          COSMOSDB_PRIMARY_KEY: ${{ secrets.COSMOSDB_PRIMARY_KEY }}
          COSMOSDB_DATABASE_ID: ${{ secrets.COSMOSDB_DATABASE_ID }}
          
          # ImageAPI specific
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          
          # Stripe configuration
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}

          # Azure Communication Services Email (optional)
          ACS_CONNECTION_STRING: ${{ secrets.ACS_CONNECTION_STRING }}
          ACS_SENDER_ADDRESS: ${{ secrets.ACS_SENDER_ADDRESS }}
          
          # Azure AD Authentication (optional)
          AAD_TENANT_ID: ${{ secrets.AAD_TENANT_ID }}
          AAD_AUDIENCE: ${{ secrets.AAD_AUDIENCE }}
          AAD_CLIENT_ID: ${{ secrets.AAD_CLIENT_ID }}
          AAD_AUTHORITY: ${{ secrets.AAD_AUTHORITY }}
          OPEN_ID_CONNECT_METADATA_URL: ${{ secrets.OPEN_ID_CONNECT_METADATA_URL }}
          AAD_VALID_ISSUERS: ${{ secrets.AAD_VALID_ISSUERS }}
          
          # Azure Infrastructure (optional - for domain management)
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_DNS_RESOURCE_GROUP: ${{ secrets.AZURE_DNS_RESOURCE_GROUP }}

          # WHMCS Domain Registration (optional)
          WHMCS_API_URL: ${{ secrets.WHMCS_API_URL }}
          WHMCS_API_IDENTIFIER: ${{ secrets.WHMCS_API_IDENTIFIER }}
          WHMCS_API_SECRET: ${{ secrets.WHMCS_API_SECRET }}

          # WHMCS Service Bus (optional)
          WHMCS_SB_QUEUE_NAME: ${{ secrets.WHMCS_SB_QUEUE_NAME }}
          
          # Google Domains Integration (optional)
          GOOGLE_CLOUD_PROJECT_ID: ${{ secrets.GOOGLE_CLOUD_PROJECT_ID }}
          GOOGLE_DOMAINS_LOCATION: ${{ secrets.GOOGLE_DOMAINS_LOCATION }}
          
          # Amazon Product Advertising API (optional)
          AMAZON_PRODUCT_ACCESS_KEY: ${{ secrets.AMAZON_PRODUCT_ACCESS_KEY }}
          AMAZON_PRODUCT_SECRET_KEY: ${{ secrets.AMAZON_PRODUCT_SECRET_KEY }}
          AMAZON_PRODUCT_PARTNER_TAG: ${{ secrets.AMAZON_PRODUCT_PARTNER_TAG }}
          AMAZON_PRODUCT_REGION: ${{ secrets.AMAZON_PRODUCT_REGION }}
          AMAZON_PRODUCT_MARKETPLACE: ${{ secrets.AMAZON_PRODUCT_MARKETPLACE }}
          
          # Penguin Random House API (optional)
          PENGUIN_RANDOM_HOUSE_API_KEY: ${{ secrets.PENGUIN_RANDOM_HOUSE_API_KEY }}
          PENGUIN_RANDOM_HOUSE_API_DOMAIN: ${{ secrets.PENGUIN_RANDOM_HOUSE_API_DOMAIN }}
        run: |
          # Validate required secrets are available
          if [ -z "$ISW_RESOURCE_GROUP" ] || [ -z "$ISW_LOCATION" ] || [ -z "$ISW_BASE_NAME" ]; then
            echo "⚠️ Skipping Ink Stained Wretches infrastructure deployment: Required secrets not configured"
            echo "   Required: ISW_RESOURCE_GROUP, ISW_LOCATION, ISW_BASE_NAME"
            exit 0
          fi

          echo "📦 Deploying Ink Stained Wretches Infrastructure..."

          # Check if resource group exists, create if it doesn't
          if ! az group show --name "$ISW_RESOURCE_GROUP" &> /dev/null; then
            echo "Creating resource group: $ISW_RESOURCE_GROUP"
            az group create --name "$ISW_RESOURCE_GROUP" --location "$ISW_LOCATION"
          else
            echo "✓ Resource group exists: $ISW_RESOURCE_GROUP"
          fi

          # Build deployment parameters
          PARAMS="baseName=$ISW_BASE_NAME location=$ISW_LOCATION"

          # Add optional parameters if configured
          if [ -n "$ISW_DNS_ZONE_NAME" ]; then
            PARAMS="$PARAMS deployDnsZone=true dnsZoneName=$ISW_DNS_ZONE_NAME"
            echo "✓ DNS Zone will be deployed: $ISW_DNS_ZONE_NAME"
          else
            PARAMS="$PARAMS deployDnsZone=false"
            echo "⚠️ DNS Zone deployment skipped (ISW_DNS_ZONE_NAME not set)"
          fi

          # Add Communication Services deployment parameter
          if [ "$DEPLOY_COMMUNICATION_SERVICES" = "true" ]; then
            PARAMS="$PARAMS deployCommunicationServices=true"
            echo "✓ Azure Communication Services will be deployed for email notifications"
          else
            PARAMS="$PARAMS deployCommunicationServices=false"
            echo "⚠️ Communication Services deployment skipped (DEPLOY_COMMUNICATION_SERVICES not set to 'true')"
          fi
          
          # Build conditional parameters using proper quoting for URL values
          PARAMS_ARRAY=()
          SECURE_PARAMS_ARRAY=()
          
          # Add Cosmos DB parameters conditionally
          [ -n "$COSMOSDB_CONNECTION_STRING" ] && SECURE_PARAMS_ARRAY+=("cosmosDbConnectionString=$COSMOSDB_CONNECTION_STRING")
          [ -n "$COSMOSDB_ENDPOINT_URI" ] && PARAMS_ARRAY+=("cosmosDbEndpointUri=$COSMOSDB_ENDPOINT_URI")
          [ -n "$COSMOSDB_PRIMARY_KEY" ] && SECURE_PARAMS_ARRAY+=("cosmosDbPrimaryKey=$COSMOSDB_PRIMARY_KEY")
          [ -n "$COSMOSDB_DATABASE_ID" ] && PARAMS_ARRAY+=("cosmosDbDatabaseId=$COSMOSDB_DATABASE_ID")

          # Add WHMCS Service Bus parameters conditionally (captured from Bicep outputs)
          [ -n "$WHMCS_SB_SENDER_CONNECTION_STRING" ] && SECURE_PARAMS_ARRAY+=("serviceBusConnectionString=$WHMCS_SB_SENDER_CONNECTION_STRING")
          SB_QUEUE_FOR_FUNCTIONS="${WHMCS_SB_QUEUE_NAME_DEPLOYED:-${WHMCS_SB_QUEUE_NAME:-}}"
          [ -n "$SB_QUEUE_FOR_FUNCTIONS" ] && PARAMS_ARRAY+=("serviceBusWhmcsQueueName=$SB_QUEUE_FOR_FUNCTIONS")
          
          # Add ImageAPI storage parameter conditionally
          [ -n "$AZURE_STORAGE_CONNECTION_STRING" ] && SECURE_PARAMS_ARRAY+=("azureStorageConnectionString=$AZURE_STORAGE_CONNECTION_STRING")
          
          # Add Stripe parameters conditionally
          [ -n "$STRIPE_API_KEY" ] && SECURE_PARAMS_ARRAY+=("stripeApiKey=$STRIPE_API_KEY")
          [ -n "$STRIPE_WEBHOOK_SECRET" ] && SECURE_PARAMS_ARRAY+=("stripeWebhookSecret=$STRIPE_WEBHOOK_SECRET")

          # Add Azure Communication Services Email parameters conditionally
          [ -n "$ACS_CONNECTION_STRING" ] && SECURE_PARAMS_ARRAY+=("acsConnectionString=$ACS_CONNECTION_STRING")
          [ -n "$ACS_SENDER_ADDRESS" ] && PARAMS_ARRAY+=("acsSenderAddress=$ACS_SENDER_ADDRESS")
          
          # Add Azure AD parameters conditionally
          [ -n "$AAD_TENANT_ID" ] && PARAMS_ARRAY+=("aadTenantId=$AAD_TENANT_ID")
          [ -n "$AAD_AUDIENCE" ] && PARAMS_ARRAY+=("aadAudience=$AAD_AUDIENCE")
          [ -n "$AAD_CLIENT_ID" ] && PARAMS_ARRAY+=("aadClientId=$AAD_CLIENT_ID")
          [ -n "$AAD_AUTHORITY" ] && PARAMS_ARRAY+=("aadAuthority=$AAD_AUTHORITY")
          [ -n "$OPEN_ID_CONNECT_METADATA_URL" ] && PARAMS_ARRAY+=("openIdConnectMetadataUrl=$OPEN_ID_CONNECT_METADATA_URL")
          [ -n "$AAD_VALID_ISSUERS" ] && PARAMS_ARRAY+=("aadValidIssuers=$AAD_VALID_ISSUERS")
          
          # Add Azure Infrastructure parameters conditionally
          [ -n "$AZURE_SUBSCRIPTION_ID" ] && PARAMS_ARRAY+=("azureSubscriptionId=$AZURE_SUBSCRIPTION_ID")
          [ -n "$AZURE_DNS_RESOURCE_GROUP" ] && PARAMS_ARRAY+=("azureDnsResourceGroup=$AZURE_DNS_RESOURCE_GROUP")
          
          # Add Google Domains parameters conditionally
          [ -n "$GOOGLE_CLOUD_PROJECT_ID" ] && PARAMS_ARRAY+=("googleCloudProjectId=$GOOGLE_CLOUD_PROJECT_ID")
          [ -n "$GOOGLE_DOMAINS_LOCATION" ] && PARAMS_ARRAY+=("googleDomainsLocation=$GOOGLE_DOMAINS_LOCATION")
          
          # Add Amazon API parameters conditionally
          [ -n "$AMAZON_PRODUCT_ACCESS_KEY" ] && SECURE_PARAMS_ARRAY+=("amazonProductAccessKey=$AMAZON_PRODUCT_ACCESS_KEY")
          [ -n "$AMAZON_PRODUCT_SECRET_KEY" ] && SECURE_PARAMS_ARRAY+=("amazonProductSecretKey=$AMAZON_PRODUCT_SECRET_KEY")
          [ -n "$AMAZON_PRODUCT_PARTNER_TAG" ] && PARAMS_ARRAY+=("amazonProductPartnerTag=$AMAZON_PRODUCT_PARTNER_TAG")
          [ -n "$AMAZON_PRODUCT_REGION" ] && PARAMS_ARRAY+=("amazonProductRegion=$AMAZON_PRODUCT_REGION")
          [ -n "$AMAZON_PRODUCT_MARKETPLACE" ] && PARAMS_ARRAY+=("amazonProductMarketplace=$AMAZON_PRODUCT_MARKETPLACE")
          
          # Add Penguin Random House parameters conditionally
          [ -n "$PENGUIN_RANDOM_HOUSE_API_KEY" ] && SECURE_PARAMS_ARRAY+=("penguinRandomHouseApiKey=$PENGUIN_RANDOM_HOUSE_API_KEY")
          [ -n "$PENGUIN_RANDOM_HOUSE_API_DOMAIN" ] && PARAMS_ARRAY+=("penguinRandomHouseApiDomain=$PENGUIN_RANDOM_HOUSE_API_DOMAIN")

          # Deploy infrastructure
          echo "🚀 Starting infrastructure deployment..."
          echo "Parameter count: ${#PARAMS_ARRAY[@]}"
          echo "Secure parameter count: ${#SECURE_PARAMS_ARRAY[@]}"
          
          # Use array expansion which properly handles values with special characters
          az deployment group create \
            --resource-group "$ISW_RESOURCE_GROUP" \
            --template-file infra/inkstainedwretches.bicep \
            --parameters $PARAMS "${PARAMS_ARRAY[@]}" "${SECURE_PARAMS_ARRAY[@]}" \
            --output json > deployment-output.json

          echo "✓ Infrastructure deployment completed"

          # Extract and display outputs
          echo "📋 Deployment outputs:"
          cat deployment-output.json | jq '.properties.outputs'

      # =========================================
      # Deploy ImageAPI Function App
      # =========================================

      - name: 'Deploy ImageAPI Function App'
        continue-on-error: true
        shell: bash
        env:
          ISW_RESOURCE_GROUP: ${{ secrets.ISW_RESOURCE_GROUP }}
          ISW_BASE_NAME: ${{ secrets.ISW_BASE_NAME }}
          DEPLOY_IMAGE_API: ${{ secrets.DEPLOY_IMAGE_API }}
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
          APPLICATIONINSIGHTS_CONNECTION_STRING_ISW: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING_ISW }}
        run: |
          # Skip if ImageAPI deployment is not enabled
          if [ "$DEPLOY_IMAGE_API" != "true" ] || [ -z "$ISW_RESOURCE_GROUP" ] || [ -z "$ISW_BASE_NAME" ]; then
            echo "⚠️ Skipping ImageAPI deployment"
            echo "   DEPLOY_IMAGE_API=$DEPLOY_IMAGE_API"
            echo "   ISW_RESOURCE_GROUP=$ISW_RESOURCE_GROUP"
            echo "   ISW_BASE_NAME=$ISW_BASE_NAME"
            exit 0
          fi

          FUNCTION_APP_NAME="${ISW_BASE_NAME}-imageapi"
          echo "🚀 Deploying ImageAPI to: $FUNCTION_APP_NAME"

          az functionapp deployment source config-zip \
            --name "$FUNCTION_APP_NAME" \
            --resource-group "$ISW_RESOURCE_GROUP" \
            --src '${{ env.IMAGE_API_PATH }}/imageapi.zip'

          AI_CONN="${APPLICATIONINSIGHTS_CONNECTION_STRING_ISW:-$APPLICATIONINSIGHTS_CONNECTION_STRING}"
          if [ -n "$AI_CONN" ]; then
            echo "🔧 Setting APPLICATIONINSIGHTS_CONNECTION_STRING on $FUNCTION_APP_NAME..."
            az functionapp config appsettings set \
              --name "$FUNCTION_APP_NAME" \
              --resource-group "$ISW_RESOURCE_GROUP" \
              --settings "APPLICATIONINSIGHTS_CONNECTION_STRING=$AI_CONN" \
              --only-show-errors \
              --output none
            echo "✓ App setting applied to $FUNCTION_APP_NAME"
          else
            echo "⚠️ APPLICATIONINSIGHTS_CONNECTION_STRING not configured; skipping app setting update"
          fi

          echo "✓ ImageAPI deployed successfully"

