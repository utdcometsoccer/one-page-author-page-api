            exit 0
          fi

          VM_NAME="${WHMCS_WORKER_VM_NAME:-whmcs-worker-vm}"
          LOCATION="${WHMCS_WORKER_LOCATION:-eastus}"

          echo "✓ Checking if VM exists: $VM_NAME"
          if ! az vm show \
               --name "$VM_NAME" \
               --resource-group "$WHMCS_WORKER_RESOURCE_GROUP" &>/dev/null; then
            echo "📦 VM not found. Deploying infrastructure..."

            # SSH public keys contain spaces, so build the parameters as an array
            # to avoid word-splitting issues during deployment.
            extraParams=()
            if [ -n "$WHMCS_WORKER_ADMIN_USERNAME" ]; then
              extraParams+=( "adminUsername=$WHMCS_WORKER_ADMIN_USERNAME" )
            fi

            az deployment group create \
              --resource-group "$WHMCS_WORKER_RESOURCE_GROUP" \
              --template-file infra/vm.bicep \
              --parameters \
                "vmName=$VM_NAME" \
                "location=$LOCATION" \
                "adminSshPublicKey=$WHMCS_WORKER_SSH_PUBLIC_KEY" \
                "${extraParams[@]}" \
              --output json > vm-deployment-output.json

            STATIC_IP=$(jq -r '.properties.outputs.staticPublicIpAddress.value // "unknown"' \
              vm-deployment-output.json)
            echo "✓ VM infrastructure deployed. Static IP: $STATIC_IP"
            echo "ℹ️ Add this IP to the WHMCS API credential IP allowlist."
          else
            echo "✓ VM already exists. Skipping infrastructure deployment."
          fi

      # =========================================
      # Deploy WhmcsWorkerService Binary (Conditional)
      # =========================================

      - name: 'Deploy WhmcsWorkerService to VM'
        shell: bash
        env:
          WHMCS_WORKER_RESOURCE_GROUP: ${{ secrets.WHMCS_WORKER_RESOURCE_GROUP }}
          WHMCS_WORKER_VM_NAME: ${{ secrets.WHMCS_WORKER_VM_NAME }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          DEPLOY_WHMCS_WORKER: ${{ secrets.DEPLOY_WHMCS_WORKER }}
        run: |
          if [ "$DEPLOY_WHMCS_WORKER" != "true" ] || \
             [ -z "$WHMCS_WORKER_RESOURCE_GROUP" ] || \
             [ -z "$AZURE_STORAGE_CONNECTION_STRING" ]; then
            echo "⚠️ Skipping WhmcsWorkerService binary deployment"
            echo "   Required: DEPLOY_WHMCS_WORKER=true, WHMCS_WORKER_RESOURCE_GROUP, AZURE_STORAGE_CONNECTION_STRING"
            exit 0
          fi

          VM_NAME="${WHMCS_WORKER_VM_NAME:-whmcs-worker-vm}"
          CONTAINER="whmcs-worker-deploy"
          BLOB="whmcsworker-${{ github.run_number }}.zip"

          # Ensure the deployment container exists
          az storage container create \
            --name "$CONTAINER" \
            --connection-string "$AZURE_STORAGE_CONNECTION_STRING" \
            --output none 2>/dev/null || true

          # Upload deployment artifact
          echo "📦 Uploading deployment package: $BLOB"
          az storage blob upload \
            --container-name "$CONTAINER" \
            --file '${{ env.WHMCS_WORKER_SERVICE_PATH }}/whmcsworker.zip' \
            --name "$BLOB" \
            --connection-string "$AZURE_STORAGE_CONNECTION_STRING" \
            --overwrite \
            --output none

          # Generate a time-limited SAS URL (valid 30 minutes) for the VM to download.
          # date -u -d requires GNU date, which is available on ubuntu-latest runners.
          EXPIRY=$(date -u -d "+30 minutes" '+%Y-%m-%dT%H:%MZ')
          SAS_URL=$(az storage blob generate-sas \
            --container-name "$CONTAINER" \
            --name "$BLOB" \
            --permissions r \
            --expiry "$EXPIRY" \
            --connection-string "$AZURE_STORAGE_CONNECTION_STRING" \
            --full-uri \
            --output tsv)

          # Define the deployment script as a variable to avoid quoting issues.
          # The script is self-contained: it installs any missing prerequisites
          # (unzip, aspnetcore-runtime-10.0, whmcsworker system user, directories)
          # so that it works on both a freshly provisioned VM (where cloud-init may
          # have already run) and on an existing VM that predates the cloud-init changes.
          DEPLOY_SCRIPT=$(cat << 'SCRIPTEOF'
          set -e
          DOWNLOAD_URL="$1"
          DEPLOY_ZIP="/tmp/whmcs-worker-deploy.zip"
          DEPLOY_DIR="/tmp/whmcs-worker-stage"
          INSTALL_DIR="/opt/whmcs-worker"
          SERVICE="whmcs-worker"

          # ---- Ensure prerequisites ----
          # set -e is active, so any unhandled failure here will abort the script.
          if ! command -v unzip &>/dev/null || ! command -v dotnet &>/dev/null; then
            echo "Installing prerequisites..."
            if ! dpkg -s 'packages-microsoft-prod' &>/dev/null; then
              wget -q https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb \
                -O /tmp/packages-microsoft-prod.deb
              dpkg -i /tmp/packages-microsoft-prod.deb
              rm /tmp/packages-microsoft-prod.deb
              apt-get update -y
            fi
            apt-get install -y --no-install-recommends aspnetcore-runtime-10.0 unzip
          fi

          # ---- Ensure service user and directories ----
          getent passwd whmcsworker >/dev/null 2>&1 || \
            useradd --system --no-create-home --shell /usr/sbin/nologin whmcsworker
          mkdir -p "$INSTALL_DIR" /etc/whmcs-worker /var/log/whmcs-worker

          echo "Downloading deployment package..."
          wget -q -O "$DEPLOY_ZIP" "$DOWNLOAD_URL"

          # Stopping the service may fail if it is not yet installed; that is expected.
          echo "Stopping service if running..."
          systemctl stop "$SERVICE" 2>/dev/null && echo "Service stopped." || echo "Service was not running (OK on first deploy)."

          echo "Extracting package..."
          rm -rf "$DEPLOY_DIR" && mkdir -p "$DEPLOY_DIR"
          unzip -q "$DEPLOY_ZIP" -d "$DEPLOY_DIR"

          echo "Installing application files..."
          cp -r "$DEPLOY_DIR"/. "$INSTALL_DIR/"

          echo "Setting ownership..."
          chown -R whmcsworker:whmcsworker "$INSTALL_DIR" /var/log/whmcs-worker || \
            echo "⚠️ chown failed for $INSTALL_DIR and/or /var/log/whmcs-worker; check permissions"
          chown root:root /etc/whmcs-worker && chmod 750 /etc/whmcs-worker

          if [ -f "$INSTALL_DIR/whmcs-worker.service" ]; then
            echo "Installing systemd unit..."
            cp "$INSTALL_DIR/whmcs-worker.service" /etc/systemd/system/
            systemctl daemon-reload
          fi

          systemctl enable "$SERVICE"
          systemctl start "$SERVICE"

          rm -f "$DEPLOY_ZIP" && rm -rf "$DEPLOY_DIR"
          echo "Deployment complete."
          systemctl status "$SERVICE" --no-pager || true
          SCRIPTEOF
          )

          echo "🚀 Deploying to VM: $VM_NAME"
          az vm run-command invoke \
            --resource-group "$WHMCS_WORKER_RESOURCE_GROUP" \
            --name "$VM_NAME" \
            --command-id RunShellScript \
            --scripts "$DEPLOY_SCRIPT" \
            --parameters "$SAS_URL" \
            --output json

          echo "✓ WhmcsWorkerService deployed to VM"

      # =========================================
      # Configure WhmcsWorkerService Environment (Conditional)
      # =========================================

      - name: 'Configure WhmcsWorkerService Environment'
        shell: bash
        env:
          WHMCS_WORKER_RESOURCE_GROUP: ${{ secrets.WHMCS_WORKER_RESOURCE_GROUP }}
          WHMCS_WORKER_VM_NAME: ${{ secrets.WHMCS_WORKER_VM_NAME }}
          WHMCS_SB_NAMESPACE_NAME: ${{ secrets.WHMCS_SB_NAMESPACE_NAME }}
          WHMCS_SB_QUEUE_NAME: ${{ secrets.WHMCS_SB_QUEUE_NAME }}
          WHMCS_API_URL: ${{ secrets.WHMCS_API_URL }}
          WHMCS_API_IDENTIFIER: ${{ secrets.WHMCS_API_IDENTIFIER }}
          WHMCS_API_SECRET: ${{ secrets.WHMCS_API_SECRET }}
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
          APPLICATIONINSIGHTS_CONNECTION_STRING_WHMCS_WORKER: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING_WHMCS_WORKER }}
          WHMCS_WORKER_LOG_LEVEL: ${{ secrets.WHMCS_WORKER_LOG_LEVEL }}
          DEPLOY_WHMCS_WORKER: ${{ secrets.DEPLOY_WHMCS_WORKER }}
        run: |
          if [ "$DEPLOY_WHMCS_WORKER" != "true" ] || [ -z "$WHMCS_WORKER_RESOURCE_GROUP" ]; then
            echo "⚠️ Skipping environment configuration: DEPLOY_WHMCS_WORKER not set or WHMCS_WORKER_RESOURCE_GROUP missing"
            exit 0
          fi

          if [ -z "$WHMCS_API_URL" ] || [ -z "$WHMCS_API_IDENTIFIER" ] || [ -z "$WHMCS_API_SECRET" ]; then
            echo "❌ WHMCS API secrets not configured; cannot write environment file."
            echo "   Required: WHMCS_API_URL, WHMCS_API_IDENTIFIER, WHMCS_API_SECRET"
            exit 1
          fi

          VM_NAME="${WHMCS_WORKER_VM_NAME:-whmcs-worker-vm}"
          SB_NAMESPACE="${WHMCS_SB_NAMESPACE_NAME:-onepageauthor-bus}"
          QUEUE_NAME="${WHMCS_SB_QUEUE_NAME_DEPLOYED:-${WHMCS_SB_QUEUE_NAME:-whmcs-domain-registrations}}"

          # Prefer the listener connection string captured from the Bicep deployment outputs.
          SB_CONN="${WHMCS_SB_LISTENER_CONNECTION_STRING:-}"

          # Fallback: retrieve the WhmcsListener connection string from the Service Bus namespace.
          if [ -z "$SB_CONN" ]; then
            SB_CONN=$(az servicebus namespace authorization-rule keys list \
              --resource-group "$WHMCS_WORKER_RESOURCE_GROUP" \
              --namespace-name "$SB_NAMESPACE" \
              --name WhmcsListener \
              --query primaryConnectionString \
              --output tsv 2>/dev/null || echo "")
          fi

          if [ -z "$SB_CONN" ]; then
            echo "❌ Could not retrieve Service Bus listener connection string from namespace '$SB_NAMESPACE'."
            echo "   Ensure the Service Bus is deployed and the WhmcsListener policy exists."
            exit 1
          fi

          # Application Insights: use the worker-specific connection string, falling back to
          # the shared APPLICATIONINSIGHTS_CONNECTION_STRING if the worker-specific one is not set.
          AI_CONN="${APPLICATIONINSIGHTS_CONNECTION_STRING_WHMCS_WORKER:-$APPLICATIONINSIGHTS_CONNECTION_STRING}"

          # Log level defaults to Information if not set.
          LOG_LEVEL="${WHMCS_WORKER_LOG_LEVEL:-Information}"

          # Write the environment file on the VM via run-command.
          # Secrets are passed as protected --parameters (positional $1-$7 in the script)
          # so they are not stored in the run-command definition visible in Azure Activity Logs.
          # Parameter order: $1=SERVICE_BUS_CONNECTION_STRING, $2=SERVICE_BUS_WHMCS_QUEUE_NAME,
          #                  $3=WHMCS_API_URL, $4=WHMCS_API_IDENTIFIER, $5=WHMCS_API_SECRET,
          #                  $6=APPLICATIONINSIGHTS_CONNECTION_STRING, $7=WHMCS_WORKER_LOG_LEVEL
          ENV_SCRIPT=$(cat << 'SCRIPTEOF'
          set -e
          mkdir -p /etc/whmcs-worker
          {
            printf 'SERVICE_BUS_CONNECTION_STRING=%s\n' "$1"
            printf 'SERVICE_BUS_WHMCS_QUEUE_NAME=%s\n'  "$2"
            printf 'WHMCS_API_URL=%s\n'                  "$3"
            printf 'WHMCS_API_IDENTIFIER=%s\n'           "$4"
            printf 'WHMCS_API_SECRET=%s\n'               "$5"
            if [ -n "$6" ]; then
              printf 'APPLICATIONINSIGHTS_CONNECTION_STRING=%s\n' "$6"
            fi
            printf 'WHMCS_WORKER_LOG_LEVEL=%s\n'         "$7"
          } > /etc/whmcs-worker/environment
          chmod 600 /etc/whmcs-worker/environment
          chown root:root /etc/whmcs-worker/environment
          systemctl restart whmcs-worker 2>/dev/null || true
          echo "Environment file written and service restarted."
          SCRIPTEOF
          )

          echo "🔧 Writing environment file on VM: $VM_NAME"
          echo "   Log level: $LOG_LEVEL"
          echo "   Application Insights: $([ -n "$AI_CONN" ] && echo 'configured' || echo 'not configured')"
          az vm run-command invoke \
            --resource-group "$WHMCS_WORKER_RESOURCE_GROUP" \
            --name "$VM_NAME" \
            --command-id RunShellScript \
            --scripts "$ENV_SCRIPT" \
            --parameters "$SB_CONN" "$QUEUE_NAME" "$WHMCS_API_URL" "$WHMCS_API_IDENTIFIER" "$WHMCS_API_SECRET" "$AI_CONN" "$LOG_LEVEL" \
            --output json

          echo "✓ Environment configured on VM: $VM_NAME"
